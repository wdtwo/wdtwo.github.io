<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>双色球号码查询</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<meta name="author" content="GaryWang">
		<meta name='renderer' content='webkit'>
		<meta http-equiv='X-UA-Compatible' content='IE=Edge,chrome=1' >
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black">
		<meta name="format-detection" content="telephone=no">
		<meta name="format-detection" content="email=no">
		<link rel="stylesheet" href="./css/bootstrap.css">
		<link rel="stylesheet" href="./css/site.css">
		<style>
			.row {max-width: 900px;margin:15px auto 0;}
			.row input,.row textarea {display: block;width: 100%;}
		</style>
		<script src="https://vuejs.org/js/vue.min.js"></script>
		<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
	</head>
<body>
	<div id="app">
		<div class="row" style="margin-top: 150px;line-height:32px">
			<div class="col-md-2 offset-md-3">查询号码</div>
			<div class="col-md-5">
				<select name="" id="" class="form-control">
					<option v-for="sel in select" :value="sel.name">{{sel.name}}</option>
				</select>
			</div>
		</div>
		<div class="row" style="margin-top: 50px;line-height:32px">
			<div class="col-md-2 offset-md-3">输出字符</div>
			<div class="col-md-5">
				<textarea name="" class="form-control" id="output" v-model="area" cols="30" rows="4"></textarea>
			</div>
		</div>
		<div class="row">
			<div class="col-md-2 offset-md-3"></div>
			<div class="col-md-5">
				<input type="button" value="查询" class="btn btn-primary" @click="send">
			</div>
		</div>
	</div>
	<script>
		var app = new Vue({
		  el: '#app',
		  data: {
		  	select:[
		  			{'name':'双色球',"value":'双色球'},
					{'name':'大乐透',"value":'大乐透'}
				],
			area:'',
			btnLock:true
		  },
			methods:{
		  		send:function () {
		  			console.log(axios)
					axios.get({
						url:'./1.php',
						data:{}
					}).then(function (res) {
						console.log(res)
					})
		  			if(this.btnLock){
		  				this.btnLock = false
		  				console.log(this.area.split(','))
					}
					this.btnLock = true
				}
			}
		})

	</script>
</body>
</html>
